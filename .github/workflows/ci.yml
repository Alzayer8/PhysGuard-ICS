name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and checks
        run: python -m pip install -e ".[dev]"
      - name: Ruff lint
        run: python -m ruff check .
      - name: Ruff format
        run: python -m ruff format --check .
      - name: MyPy
        run: python -m mypy physguard
      - name: pytest
        run: python -m pytest
      - name: Verify release integrity metadata
        run: python scripts/release_integrity.py
