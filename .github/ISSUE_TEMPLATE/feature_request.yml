name: Feature request
description: Propose a focused public-release improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe behavior, evidence model, and compatibility considerations.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and data implications
      description: Explain any effect on operational use, privacy, or dataset handling.
    validations:
      required: true
